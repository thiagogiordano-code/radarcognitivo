name: Deploy to VPS

on:
  push:
    branches: [main, claude/fix-data-storage-reports-RMccA]
  workflow_dispatch:

env:
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: FRONTEND_IMAGE,BACKEND_IMAGE,GHCR_TOKEN,GHCR_USER,DB_PASSWORD
          script: |
            set -euo pipefail
            PROJECT=radarcognitivo
            WORKDIR=/opt/radarcognitivo

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            mkdir -p "$WORKDIR"
            cat > "$WORKDIR/docker-compose.yml" << 'COMPOSE'
            services:
              db:
                image: postgres:16-alpine
                environment:
                  POSTGRES_DB: radarcognitivo
                  POSTGRES_USER: radar
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - pgdata:/var/lib/postgresql/data
                restart: unless-stopped
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U radar -d radarcognitivo"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              backend:
                image: ${BACKEND_IMAGE}
                environment:
                  DATABASE_URL: postgresql://radar:${DB_PASSWORD}@db:5432/radarcognitivo
                depends_on:
                  db:
                    condition: service_healthy
                restart: unless-stopped

              frontend:
                image: ${FRONTEND_IMAGE}
                ports:
                  - "3000:80"
                depends_on:
                  - backend
                restart: unless-stopped

            volumes:
              pgdata:
            COMPOSE

            cd "$WORKDIR"

            echo ">>> [1] Removendo qualquer container publicando porta 3000..."
            CONTAINERS_3000=$(docker ps --filter "publish=3000" --format "{{.ID}}")
            if [ -n "$CONTAINERS_3000" ]; then
              echo "    IDs na porta 3000: $CONTAINERS_3000"
              docker stop $CONTAINERS_3000 2>/dev/null || true
              docker rm -f $CONTAINERS_3000 2>/dev/null || true
            fi

            echo ">>> [2] Parando containers orfaos do repositorio (qualquer projeto)..."
            ORPHAN_NAMES=$(docker ps --format "{{.Names}}" | grep -iE "radar|cognitivo" || true)
            if [ -n "$ORPHAN_NAMES" ]; then
              echo "    Orfaos: $ORPHAN_NAMES"
              echo "$ORPHAN_NAMES" | xargs docker stop 2>/dev/null || true
              echo "$ORPHAN_NAMES" | xargs docker rm -f 2>/dev/null || true
            fi

            echo ">>> [3] docker compose -p $PROJECT down --remove-orphans..."
            FRONTEND_IMAGE="$FRONTEND_IMAGE" BACKEND_IMAGE="$BACKEND_IMAGE" DB_PASSWORD="$DB_PASSWORD" \
              docker compose -p "$PROJECT" down --remove-orphans --timeout 30 || true

            echo ">>> [4] Aguardando liberacao real da porta 3000..."
            for i in $(seq 1 15); do
              REMAINING=$(docker ps --filter "publish=3000" --format "{{.ID}}")
              if [ -n "$REMAINING" ]; then
                echo "    [i=$i] Container $REMAINING ainda na 3000, removendo..."
                docker stop $REMAINING 2>/dev/null || true
                docker rm -f $REMAINING 2>/dev/null || true
                sleep 2
                continue
              fi
              if ss -tlnp | grep -q ':3000 '; then
                echo "    [i=$i] Processo do host ainda na 3000..."
                lsof -ti:3000 2>/dev/null | xargs -r kill -9 2>/dev/null || true
                sleep 2
                continue
              fi
              echo "    Porta 3000 livre na tentativa $i."
              break
            done

            if ss -tlnp | grep -q ':3000 '; then
              echo "ERRO FATAL: porta 3000 ainda ocupada apos 15 tentativas."
              ss -tlnp | grep ':3000' || true
              docker ps --format "table {{.Names}}\t{{.Ports}}"
              exit 1
            fi

            echo ">>> [5] docker compose pull..."
            FRONTEND_IMAGE="$FRONTEND_IMAGE" BACKEND_IMAGE="$BACKEND_IMAGE" DB_PASSWORD="$DB_PASSWORD" \
              docker compose -p "$PROJECT" pull

            echo ">>> [6] docker compose -p $PROJECT up -d --force-recreate --remove-orphans..."
            FRONTEND_IMAGE="$FRONTEND_IMAGE" BACKEND_IMAGE="$BACKEND_IMAGE" DB_PASSWORD="$DB_PASSWORD" \
              docker compose -p "$PROJECT" up -d --force-recreate --remove-orphans

            echo ">>> [7] Status pos-deploy:"
            sleep 3
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | head -20
            docker compose -p "$PROJECT" ps
            docker compose -p "$PROJECT" logs --tail=50

        env:
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
