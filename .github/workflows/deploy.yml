name: Build e Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/thiagogiordano-code/radarcognitivo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build e push da imagem
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 5m
          envs: IMAGE_NAME,GHCR_TOKEN,GHCR_USER
          script: |
            set -eo pipefail

            # Validação: IMAGE_NAME deve estar definido
            if [ -z "${IMAGE_NAME:-}" ]; then
              echo "ERRO: IMAGE_NAME não foi passado para o script." >&2
              exit 1
            fi

            IMAGE="${IMAGE_NAME}:latest"
            echo "=== Imagem alvo: ${IMAGE} ==="

            echo "=== Login GHCR ==="
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            echo "=== Parando containers existentes ==="
            docker stop radarcognitivo 2>/dev/null || true
            docker rm   radarcognitivo 2>/dev/null || true

            # Para docker-compose legado (projeto radarcognitivo do deploy anterior)
            if docker compose -p radarcognitivo ps -q 2>/dev/null | grep -q .; then
              echo "Parando docker-compose do projeto radarcognitivo..."
              docker compose -p radarcognitivo down --remove-orphans --timeout 20 || true
            fi

            # Libera qualquer container ainda na porta 3000
            CID=$(docker ps -q --filter "publish=3000" 2>/dev/null)
            if [ -n "${CID}" ]; then
              echo "Parando containers na porta 3000: ${CID}"
              docker stop ${CID} || true
              docker rm -f ${CID} || true
            fi

            echo "=== Aguardando porta 3000 ficar livre ==="
            for i in $(seq 1 10); do
              if ! ss -ltn 2>/dev/null | grep -q ':3000 '; then
                echo "Porta 3000 livre."
                break
              fi
              echo "Tentativa ${i}/10 — aguardando 3s..."
              sleep 3
            done

            echo "=== Pull da imagem ==="
            docker pull "${IMAGE}"

            echo "=== Iniciando container ==="
            docker run -d \
              --name radarcognitivo \
              --restart unless-stopped \
              -p 3000:80 \
              "${IMAGE}"

            echo "=== Status final ==="
            sleep 2
            docker ps --filter "name=radarcognitivo" \
              --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "=== Deploy concluído ==="
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
