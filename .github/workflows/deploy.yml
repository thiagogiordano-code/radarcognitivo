name: Build e Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/thiagogiordano-code/radarcognitivo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}:frontend

  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}:backend

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY: ghcr.io/thiagogiordano-code/radarcognitivo
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          envs: REGISTRY,GHCR_USER,GHCR_TOKEN,GEMINI_API_KEY
          script: |
            set -eo pipefail
            PROJECT="radarcognitivo"
            WORKDIR="/opt/radarcognitivo"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            mkdir -p "$WORKDIR"
            cd "$WORKDIR"
            FRONTEND_PORT=3000
            if ss -ltnp 2>/dev/null | grep -q ':3000'; then
              echo "Porta 3000 ocupada; usando 8080"
              FRONTEND_PORT=8080
            fi
            cat > docker-compose.yml <<COMPOSE
            services:
              backend:
                image: ${REGISTRY}:backend
                environment:
                  - GEMINI_API_KEY=${GEMINI_API_KEY}
                expose:
                  - "4000"
                restart: unless-stopped
              frontend:
                image: ${REGISTRY}:frontend
                ports:
                  - "${FRONTEND_PORT}:80"
                depends_on:
                  - backend
                restart: unless-stopped
            COMPOSE
            echo "=== COMPOSE GERADO ==="
            cat docker-compose.yml
            docker compose -p "$PROJECT" down --remove-orphans --timeout 10 || true
            docker compose -p "$PROJECT" pull
            docker compose -p "$PROJECT" up -d --force-recreate --remove-orphans
            docker compose -p "$PROJECT" ps
            docker ps --format 'table {{.Names}}\t{{.Ports}}'
            ss -ltnp | grep -E ':3000|:8080|:4000' || true
            curl -I "http://localhost:${FRONTEND_PORT}" || true
            echo "FRONTEND_PORT=${FRONTEND_PORT}"
