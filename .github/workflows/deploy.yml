name: Build e Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/thiagogiordano-code/radarcognitivo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: IMAGE_NAME,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            IMAGE="${IMAGE_NAME}:latest"

            echo "=== Login GHCR ==="
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "=== Parando containers existentes ==="
            docker stop radarcognitivo 2>/dev/null || true
            docker rm radarcognitivo 2>/dev/null || true

            if docker compose -p radarcognitivo ps -q 2>/dev/null | grep -q .; then
              echo "Parando docker-compose do projeto radarcognitivo..."
              docker compose -p radarcognitivo down --remove-orphans --timeout 20 || true
            fi

            CID=$(docker ps -q --filter "publish=3000" 2>/dev/null || true)
            if [ -n "$CID" ]; then
              echo "Parando containers na porta 3000: $CID"
              docker stop $CID || true
              docker rm -f $CID || true
            fi

            echo "=== Aguardando porta 3000 ==="
            for i in $(seq 1 10); do
              if ! ss -ltn 2>/dev/null | grep -q ':3000 '; then
                echo "Porta 3000 livre."
                break
              fi
              echo "Tentativa $i/10 — aguardando..."
              sleep 3
            done

            echo "=== Pull e start ==="
            docker pull "$IMAGE"
            docker run -d \
              --name radarcognitivo \
              --restart unless-stopped \
              -p 3000:80 \
              "$IMAGE"

            echo "=== Status ==="
            sleep 2
            docker ps --filter "name=radarcognitivo" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "=== Deploy concluído ==="
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
