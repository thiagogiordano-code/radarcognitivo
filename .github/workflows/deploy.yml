name: Build e Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/thiagogiordano-code/radarcognitivo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build e push da imagem
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 5m
          envs: IMAGE_NAME,GHCR_TOKEN,GHCR_USER,GEMINI_API_KEY
          script: |
            set -eo pipefail
            IMAGE="${IMAGE_NAME}:latest"

            echo "=== Login GHCR ==="
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            echo "=== Parando containers existentes ==="
            docker stop radarcognitivo 2>/dev/null || true
            docker rm   radarcognitivo 2>/dev/null || true
            if docker compose -p radarcognitivo ps -q 2>/dev/null | grep -q .; then
              docker compose -p radarcognitivo down --remove-orphans --timeout 20 || true
            fi
            CID=$(docker ps -q --filter "publish=3000" 2>/dev/null)
            if [ -n "${CID}" ]; then
              docker stop ${CID} || true
              docker rm -f ${CID} || true
            fi

            echo "=== Pull ==="
            docker pull "${IMAGE}"

            echo "=== Start ==="
            docker run -d \
              --name radarcognitivo \
              --restart unless-stopped \
              -p 3000:80 \
              -e GEMINI_API_KEY="${GEMINI_API_KEY}" \
              "${IMAGE}"

            sleep 2
            docker ps --filter "name=radarcognitivo" \
              --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "=== Deploy concluído ==="
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
