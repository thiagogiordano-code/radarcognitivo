name: Build e Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/thiagogiordano-code/radarcognitivo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}:frontend

  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}:backend

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          envs: REGISTRY,GHCR_TOKEN,GHCR_USER,GEMINI_API_KEY
          script: |
            set -eo pipefail
            PROJECT=radarcognitivo
            WORKDIR=/opt/radarcognitivo

            echo "=== Login GHCR ==="
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            mkdir -p "$WORKDIR"

            cat > "$WORKDIR/docker-compose.yml" << 'COMPOSE'
            services:
              backend:
                image: ${REGISTRY}:backend
                environment:
                  - GEMINI_API_KEY=${GEMINI_API_KEY}
                restart: unless-stopped

              frontend:
                image: ${REGISTRY}:frontend
                ports:
                  - "3000:80"
                depends_on:
                  - backend
                restart: unless-stopped
            COMPOSE

            cd "$WORKDIR"

            echo "=== Pull ==="
            REGISTRY="${REGISTRY}" docker compose -p "$PROJECT" pull

            echo "=== Up ==="
            REGISTRY="${REGISTRY}" \
            GEMINI_API_KEY="${GEMINI_API_KEY}" \
              docker compose -p "$PROJECT" up -d --remove-orphans

            sleep 3

            echo "=== Status ==="
            REGISTRY="${REGISTRY}" \
            GEMINI_API_KEY="${GEMINI_API_KEY}" \
              docker compose -p "$PROJECT" ps

            echo "=== Logs backend ==="
            docker logs radarcognitivo-backend-1 --tail=20 2>/dev/null || \
            docker compose -p "$PROJECT" logs backend --tail=20 || true

            echo "=== Deploy concluído ==="
        env:
          REGISTRY: ${{ env.REGISTRY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
