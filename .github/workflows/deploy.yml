name: Deploy to VPS

on:
  push:
    branches: [main, claude/fix-data-storage-reports-RMccA]
  workflow_dispatch:

env:
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

      - name: Deploy RadarCognitivo to VPS (Docker Compose, idempotent, fallback 3001)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: FRONTEND_IMAGE,BACKEND_IMAGE,GHCR_TOKEN,GHCR_USER,DB_PASSWORD
          script_stop: true
          script: |
            set -euo pipefail
            WORKDIR="/opt/radarcognitivo"
            BRANCH="main"
            PROJECT="radarcognitivo"
            PRIMARY_PORT="3000"
            FALLBACK_PORT="3001"

            echo "== Deploy: start =="
            echo "WORKDIR=${WORKDIR} | BRANCH=${BRANCH} | PROJECT=${PROJECT}"

            # ── GHCR login ────────────────────────────────────────────────
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # ── Ensure repo exists (clone if missing) ─────────────────────
            if [ ! -d "${WORKDIR}/.git" ]; then
              echo "== Repo not found. Cloning =="
              sudo mkdir -p "${WORKDIR}"
              sudo chown -R "$USER:$USER" "${WORKDIR}"
              git clone "${{ secrets.REPO_SSH_URL }}" "${WORKDIR}"
            fi

            cd "${WORKDIR}"

            echo "== Git sync =="
            git fetch --all
            git reset --hard "origin/${BRANCH}"

            echo "== Ensure COMPOSE_PROJECT_NAME in .env (no clobber) =="
            ENVFILE="${WORKDIR}/.env"
            touch "${ENVFILE}"
            if grep -q '^COMPOSE_PROJECT_NAME=' "${ENVFILE}"; then
              sed -i "s/^COMPOSE_PROJECT_NAME=.*/COMPOSE_PROJECT_NAME=${PROJECT}/" "${ENVFILE}"
            else
              echo "COMPOSE_PROJECT_NAME=${PROJECT}" >> "${ENVFILE}"
            fi
            echo "== .env: COMPOSE_PROJECT_NAME=${PROJECT} =="

            echo "== Docker/Compose versions =="
            docker --version || true
            docker compose version || true

            echo "== [1] Compose down =="
            FRONTEND_IMAGE="$FRONTEND_IMAGE" BACKEND_IMAGE="$BACKEND_IMAGE" DB_PASSWORD="$DB_PASSWORD" \
              docker compose -p "${PROJECT}" down --remove-orphans --timeout 30 || true

            port_listening() {
              local port="$1"
              ss -ltn | grep -q ":${port} " 2>/dev/null
            }

            free_port_if_docker() {
              local port="$1"
              local cid
              cid=$(docker ps -q --filter "publish=${port}" || true)
              if [ -n "${cid}" ]; then
                echo "Port ${port} is published by Docker container(s): ${cid}"
                docker stop ${cid} || true
                docker rm -f ${cid} || true
                return 0
              fi
              return 1
            }

            echo "== [2] Free PRIMARY_PORT=${PRIMARY_PORT} if Docker publishes it =="
            free_port_if_docker "${PRIMARY_PORT}" || true

            echo "== [3] Wait loop (10x) for port ${PRIMARY_PORT} =="
            for i in $(seq 1 10); do
              free_port_if_docker "${PRIMARY_PORT}" || true
              if port_listening "${PRIMARY_PORT}"; then
                echo "Port ${PRIMARY_PORT} still listening (attempt ${i}/10)."
                sleep 2
              else
                echo "Port ${PRIMARY_PORT} is free."
                break
              fi
            done

            TARGET_PORT="${PRIMARY_PORT}"

            echo "== [4] Decide: 3000 vs 3001 =="
            if port_listening "${PRIMARY_PORT}"; then
              if [ -z "$(docker ps -q --filter "publish=${PRIMARY_PORT}" || true)" ]; then
                echo "Host process is holding port ${PRIMARY_PORT}. Falling back to ${FALLBACK_PORT}."
                echo "Diagnostic ss -ltnp:"
                ss -ltnp | grep ":${PRIMARY_PORT} " || true
                echo "Diagnostic lsof:"
                lsof -iTCP:${PRIMARY_PORT} -sTCP:LISTEN -n -P || true
                TARGET_PORT="${FALLBACK_PORT}"
              else
                echo "Docker still publishes ${PRIMARY_PORT} after cleanup attempts. Failing."
                docker ps --filter "publish=${PRIMARY_PORT}" --format "table {{.ID}}\t{{.Names}}\t{{.Ports}}" || true
                exit 1
              fi
            fi

            echo ">>> [4] FRONTEND_HOST_PORT=${TARGET_PORT}"

            echo "== [5] Pull images =="
            FRONTEND_IMAGE="$FRONTEND_IMAGE" BACKEND_IMAGE="$BACKEND_IMAGE" DB_PASSWORD="$DB_PASSWORD" \
              docker compose -p "${PROJECT}" pull || true

            echo "== [6] Compose up =="
            export FRONTEND_HOST_PORT="${TARGET_PORT}"
            if ! FRONTEND_IMAGE="$FRONTEND_IMAGE" BACKEND_IMAGE="$BACKEND_IMAGE" DB_PASSWORD="$DB_PASSWORD" \
              docker compose -p "${PROJECT}" up -d --force-recreate --remove-orphans; then
              echo "== ERROR: compose up failed. Diagnostics follow =="
              echo "== docker compose config (first 200 lines) =="
              FRONTEND_IMAGE="$FRONTEND_IMAGE" BACKEND_IMAGE="$BACKEND_IMAGE" DB_PASSWORD="$DB_PASSWORD" \
                FRONTEND_HOST_PORT="${TARGET_PORT}" \
                docker compose -p "${PROJECT}" config | sed -n '1,200p' || true
              echo "== compose logs (tail 200) =="
              docker compose -p "${PROJECT}" logs --tail=200 || true
              echo "== ss -ltnp (3000/3001) =="
              ss -ltnp | grep -E ':(3000|3001) ' || true
              echo "== docker ps publish 3000/3001 =="
              docker ps --filter "publish=3000" --format "table {{.ID}}\t{{.Names}}\t{{.Ports}}" || true
              docker ps --filter "publish=3001" --format "table {{.ID}}\t{{.Names}}\t{{.Ports}}" || true
              echo "== docker info (summary) =="
              docker info | sed -n '1,120p' || true
              echo "== WORKDIR listing =="
              ls -la
              exit 1
            fi

            echo "== [7] Post-deploy =="
            sleep 3
            docker compose -p "${PROJECT}" ps || true
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | sed -n '1,80p'
            echo "== Deploy concluded. FRONTEND_HOST_PORT=${TARGET_PORT} =="

        env:
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
