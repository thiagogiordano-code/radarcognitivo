name: Deploy to VPS

on:
  push:
    branches: [main, claude/fix-data-storage-reports-RMccA]
  workflow_dispatch:

env:
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: FRONTEND_IMAGE,BACKEND_IMAGE,GHCR_TOKEN,GHCR_USER,DB_PASSWORD
          script: |
            set -euo pipefail
            PROJECT=radarcognitivo
            WORKDIR=/opt/radarcognitivo
            PRIMARY_PORT=3000
            FALLBACK_PORT=3001

            echo "== Deploy starting | project=${PROJECT} workdir=${WORKDIR} =="

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            mkdir -p "$WORKDIR"

            # Upsert COMPOSE_PROJECT_NAME no .env sem sobrescrever outras variáveis
            ENVFILE="$WORKDIR/.env"
            touch "$ENVFILE"
            if grep -q '^COMPOSE_PROJECT_NAME=' "$ENVFILE"; then
              sed -i "s/^COMPOSE_PROJECT_NAME=.*/COMPOSE_PROJECT_NAME=${PROJECT}/" "$ENVFILE"
            else
              echo "COMPOSE_PROJECT_NAME=${PROJECT}" >> "$ENVFILE"
            fi
            echo "== .env: $(grep COMPOSE_PROJECT_NAME $ENVFILE) =="

            cat > "$WORKDIR/docker-compose.yml" << 'COMPOSE'
            services:
              db:
                image: postgres:16-alpine
                environment:
                  POSTGRES_DB: radarcognitivo
                  POSTGRES_USER: radar
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - pgdata:/var/lib/postgresql/data
                restart: unless-stopped
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U radar -d radarcognitivo"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              backend:
                image: ${BACKEND_IMAGE}
                environment:
                  DATABASE_URL: postgresql://radar:${DB_PASSWORD}@db:5432/radarcognitivo
                depends_on:
                  db:
                    condition: service_healthy
                restart: unless-stopped

              frontend:
                image: ${FRONTEND_IMAGE}
                ports:
                  - "${FRONTEND_HOST_PORT:-3000}:80"
                depends_on:
                  - backend
                restart: unless-stopped

            volumes:
              pgdata:
            COMPOSE

            cd "$WORKDIR"

            echo ">>> [1] Compose down com remoção de órfãos..."
            FRONTEND_IMAGE="$FRONTEND_IMAGE" BACKEND_IMAGE="$BACKEND_IMAGE" DB_PASSWORD="$DB_PASSWORD" \
              docker compose -p "$PROJECT" down --remove-orphans --timeout 30 || true

            echo ">>> [2] Removendo containers que publicam ${PRIMARY_PORT}..."
            CID=$(docker ps -q --filter "publish=${PRIMARY_PORT}" || true)
            if [ -n "$CID" ]; then
              echo "    IDs na porta ${PRIMARY_PORT}: $CID"
              docker stop $CID || true
              docker rm -f $CID || true
            fi

            echo ">>> [3] Aguardando porta ${PRIMARY_PORT} livre..."
            TARGET_PORT="${PRIMARY_PORT}"
            for i in $(seq 1 10); do
              if ! ss -ltn | grep -q ":${PRIMARY_PORT} "; then
                echo "    Porta ${PRIMARY_PORT} livre (tentativa ${i})."
                break
              fi
              echo "    Tentativa ${i}/10: porta ${PRIMARY_PORT} ainda ocupada..."
              CID=$(docker ps -q --filter "publish=${PRIMARY_PORT}" || true)
              if [ -n "$CID" ]; then
                docker stop $CID 2>/dev/null || true
                docker rm -f $CID 2>/dev/null || true
              fi
              sleep 2
            done

            # Se ainda ocupada por processo host (não Docker), ativa fallback 3001
            if ss -ltn | grep -q ":${PRIMARY_PORT} "; then
              echo ">>> AVISO: porta ${PRIMARY_PORT} ocupada por processo host (não Docker)."
              echo "    Diagnostico:"
              ss -ltnp | grep ":${PRIMARY_PORT} " || true
              echo "    Ativando fallback para porta ${FALLBACK_PORT}."
              TARGET_PORT="${FALLBACK_PORT}"
            fi

            echo ">>> [4] FRONTEND_HOST_PORT=${TARGET_PORT}"

            echo ">>> [5] docker compose pull..."
            FRONTEND_IMAGE="$FRONTEND_IMAGE" BACKEND_IMAGE="$BACKEND_IMAGE" DB_PASSWORD="$DB_PASSWORD" \
              docker compose -p "$PROJECT" pull

            echo ">>> [6] docker compose up (port=${TARGET_PORT})..."
            FRONTEND_IMAGE="$FRONTEND_IMAGE" BACKEND_IMAGE="$BACKEND_IMAGE" DB_PASSWORD="$DB_PASSWORD" \
            FRONTEND_HOST_PORT="$TARGET_PORT" \
              docker compose -p "$PROJECT" up -d --force-recreate --remove-orphans

            echo ">>> [7] Status pos-deploy:"
            sleep 3
            docker compose -p "$PROJECT" ps
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | head -20
            docker compose -p "$PROJECT" logs --tail=50
            echo "== Deploy concluido. Frontend disponivel na porta ${TARGET_PORT}. =="

        env:
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
