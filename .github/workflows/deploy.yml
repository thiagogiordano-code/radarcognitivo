name: Build e Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/thiagogiordano-code/radarcognitivo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}:frontend

  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}:backend

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY: ghcr.io/thiagogiordano-code/radarcognitivo
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          envs: REGISTRY,GHCR_USER,GHCR_TOKEN,GEMINI_API_KEY
          script: |
            set -eo pipefail
            PROJECT="radarcognitivo"
            WORKDIR="/opt/radarcognitivo"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            mkdir -p "$WORKDIR"
            cd "$WORKDIR"
            systemctl is-enabled radarcognitivo.service >/dev/null 2>&1 && systemctl disable radarcognitivo.service || true
            systemctl is-active radarcognitivo.service >/dev/null 2>&1 && systemctl stop radarcognitivo.service || true
            pm2 describe mipt-rc >/dev/null 2>&1 && pm2 delete mipt-rc || true
            pm2 describe claude-app >/dev/null 2>&1 && pm2 delete claude-app || true
            PORT_PID="$(ss -ltnp 2>/dev/null | awk '/:3000/ {print $NF}' | sed -n 's/.*pid=\([0-9]\+\).*/\1/p' | head -n1)"
            if [ -n "${PORT_PID:-}" ]; then
              ps -fp "$PORT_PID" || true
              kill -9 "$PORT_PID" || true
            fi
            docker compose -p "$PROJECT" down --remove-orphans --timeout 10 || true
            ss -ltnp | grep ':3000' || echo "OK: porta 3000 livre"
            FRONTEND_PORT=3000
            if ss -ltnp 2>/dev/null | grep -q ':3000'; then
              echo "Porta 3000 ainda ocupada; usando 8080"
              FRONTEND_PORT=8080
            fi
            cat > docker-compose.yml <<COMPOSE
            services:
              backend:
                image: ${REGISTRY}:backend
                environment:
                  - GEMINI_API_KEY=${GEMINI_API_KEY}
                expose:
                  - "4000"
                restart: unless-stopped
              frontend:
                image: ${REGISTRY}:frontend
                ports:
                  - "${FRONTEND_PORT}:80"
                depends_on:
                  - backend
                restart: unless-stopped
            COMPOSE
            echo "=== COMPOSE GERADO ==="
            cat docker-compose.yml
            docker compose -p "$PROJECT" pull
            docker compose -p "$PROJECT" up -d --force-recreate --remove-orphans
            docker compose -p "$PROJECT" ps
            docker ps --format 'table {{.Names}}\t{{.Ports}}'
            ss -ltnp | grep -E ':3000|:8080|:4000' || true
            curl -I "http://localhost:${FRONTEND_PORT}" || true
            echo "=== Aguardando backend inicializar (5s) ==="
            sleep 5
            echo "=== ENV backend (GEMINI_API_KEY) ==="
            docker exec radarcognitivo-backend-1 printenv | grep GEMINI || echo "GEMINI_API_KEY nao encontrada"
            echo "=== Health check backend ==="
            docker exec radarcognitivo-backend-1 wget -qO- http://localhost:4000/health 2>&1 || true
            echo "=== Logs backend (arranque) ==="
            docker logs radarcognitivo-backend-1 --tail=50 2>&1 || true
            echo "=== Teste POST /api/analyze ==="
            docker exec radarcognitivo-backend-1 wget -qO- \
              --header='Content-Type: application/json' \
              --post-data='{"profile":{"course":"Teste","dominantVark":["Visual"],"dominantKolb":["Ativo"]}}' \
              http://localhost:4000/api/analyze 2>&1 || true
            echo "=== Logs backend (pós-teste) ==="
            docker logs radarcognitivo-backend-1 --tail=20 2>&1 || true
            echo "FRONTEND_PORT=${FRONTEND_PORT}"
