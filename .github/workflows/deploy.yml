name: Build e Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FRONTEND_IMAGE: ghcr.io/thiagogiordano-code/radarcognitivo/frontend
  BACKEND_IMAGE: ghcr.io/thiagogiordano-code/radarcognitivo/backend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build e push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build e push backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          envs: FRONTEND_IMAGE,BACKEND_IMAGE,GHCR_TOKEN,GHCR_USER,GEMINI_API_KEY
          script: |
            set -eo pipefail
            PROJECT=radarcognitivo
            WORKDIR=/opt/radarcognitivo

            echo "=== Login GHCR ==="
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            mkdir -p "$WORKDIR"

            cat > "$WORKDIR/docker-compose.yml" << 'COMPOSE'
            services:
              backend:
                image: ${BACKEND_IMAGE}:latest
                environment:
                  - GEMINI_API_KEY=${GEMINI_API_KEY}
                restart: unless-stopped

              frontend:
                image: ${FRONTEND_IMAGE}:latest
                ports:
                  - "3000:80"
                depends_on:
                  - backend
                restart: unless-stopped
            COMPOSE

            cd "$WORKDIR"

            echo "=== Pull ==="
            FRONTEND_IMAGE="${FRONTEND_IMAGE}" BACKEND_IMAGE="${BACKEND_IMAGE}" \
              docker compose -p "$PROJECT" pull

            echo "=== Up ==="
            FRONTEND_IMAGE="${FRONTEND_IMAGE}" \
            BACKEND_IMAGE="${BACKEND_IMAGE}" \
            GEMINI_API_KEY="${GEMINI_API_KEY}" \
              docker compose -p "$PROJECT" up -d --remove-orphans

            sleep 3
            docker compose -p "$PROJECT" ps
            echo "=== Deploy concluído ==="
        env:
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
