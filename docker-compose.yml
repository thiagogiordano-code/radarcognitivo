services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: radarcognitivo
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d radarcognitivo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-radarcognitivo-backend}
    environment:
      DATABASE_URL: postgresql://radar:${DB_PASSWORD}@db:5432/radarcognitivo
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-radarcognitivo-frontend}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
